post:
    username:
        - NotBlank:
              message: 'validation.not_blank'
        - Email:
              message: 'validation.email'

    password:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              min: 8
              max: 128
              minMessage: 'customer.password.error.min_length'
              maxMessage: 'customer.password.error.max_length'
