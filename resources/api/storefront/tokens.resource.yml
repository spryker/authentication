resource:
    name: Tokens
    shortName: tokens
    description: 'Creates access tokens for customer authentication using username and password'

    operations:
        - type: Post
          normalizationContext:
              gen_id: false

    processor: Spryker\Glue\Authentication\Api\Storefront\Processor\TokensStorefrontProcessor

    paginationEnabled: false

    properties:
        # Request properties
        username:
            type: string
            writable: true
            readable: false
            required: true
            description: 'Customer email address'
            openapiContext:
                example: 'john.doe@example.com'

        password:
            type: string
            writable: true
            readable: false
            required: true
            description: 'Customer password'
            openapiContext:
                example: 'SecurePassword123!'

        # Response properties (read-only)
        accessToken:
            type: string
            writable: false
            readable: true
            identifier: true
            description: 'JWT access token for authenticating subsequent API requests'
            openapiContext:
                example: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...'

        tokenType:
            type: string
            writable: false
            readable: true
            description: 'Token type, always Bearer for OAuth 2.0'
            openapiContext:
                example: 'Bearer'

        expiresIn:
            type: integer
            writable: false
            readable: true
            description: 'Token lifetime in seconds from issuance'
            openapiContext:
                example: 3600

        refreshToken:
            type: string
            writable: false
            readable: true
            description: 'Token used to obtain a new access token when the current one expires'
            openapiContext:
                example: 'def50200a1b2c3d4e5f6789012345678901234567890abcdef...'
