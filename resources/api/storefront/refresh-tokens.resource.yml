resource:
    name: RefreshTokens
    shortName: refresh-tokens
    description: 'Refreshes access tokens or revokes refresh tokens'

    operations:
        - type: Post
        - type: Delete
          openapiContext:
              path: '/refresh-tokens/{refreshToken}'

    processor: Spryker\Glue\Authentication\Api\Storefront\Processor\RefreshTokensStorefrontProcessor
    provider: Spryker\Glue\Authentication\Api\Storefront\Provider\RefreshTokensStorefrontProvider

    paginationEnabled: false

    properties:
        # Request/identifier property
        refreshToken:
            type: string
            writable: true
            readable: true
            identifier: true
            required: true
            description: 'Refresh token used to obtain new access token or to revoke'
            openapiContext:
                example: 'def50200a1b2c3d4e5f6789012345678901234567890abcdef...'

        # Response properties (read-only)
        tokenType:
            type: string
            writable: false
            readable: true
            description: 'Token type, always Bearer for OAuth 2.0'
            openapiContext:
                example: 'Bearer'

        expiresIn:
            type: integer
            writable: false
            readable: true
            description: 'Token lifetime in seconds from issuance'
            openapiContext:
                example: 3600

        accessToken:
            type: string
            writable: false
            readable: true
            description: 'JWT access token for authenticating subsequent API requests'
            openapiContext:
                example: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...'
